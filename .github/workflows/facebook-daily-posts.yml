name: iLoveKaraikudi 4 Daily Posts

on:
  schedule:
    - cron: '30 2 * * *'   # Slot 1 — 8:00 AM IST
    - cron: '30 6 * * *'   # Slot 2 — 12:00 PM IST
    - cron: '30 12 * * *'  # Slot 3 — 6:00 PM IST
    - cron: '30 15 * * *'  # Slot 4 — 9:00 PM IST
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to run (1-4)'
        required: false
        default: '1'

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post to Facebook
        env:
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN:     ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          POST_SLOT:         ${{ github.event.inputs.slot || '1' }}
        run: python post_facebook.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_id }}
          path: post_log.json
          retention-days: 30
