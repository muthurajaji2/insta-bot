name: Facebook Daily 8 AI Posts

on:
  schedule:
    - cron: '30 1 * * *'   # Slot 1 — 7:00 AM IST
    - cron: '30 3 * * *'   # Slot 2 — 9:00 AM IST
    - cron: '30 5 * * *'   # Slot 3 — 11:00 AM IST
    - cron: '30 7 * * *'   # Slot 4 — 1:00 PM IST
    - cron: '30 9 * * *'   # Slot 5 — 3:00 PM IST
    - cron: '30 11 * * *'  # Slot 6 — 5:00 PM IST
    - cron: '30 13 * * *'  # Slot 7 — 7:00 PM IST
    - cron: '30 15 * * *'  # Slot 8 — 9:00 PM IST
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to run (1-8)'
        required: false
        default: 'auto'

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine post slot
        id: slot
        run: |
          INPUT="${{ github.event.inputs.slot }}"
          if [ -n "$INPUT" ] && [ "$INPUT" != "auto" ]; then
            echo "slot=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H" | sed 's/^0//')
            case "$HOUR" in
              1)  SLOT=1 ;;
              3)  SLOT=2 ;;
              5)  SLOT=3 ;;
              7)  SLOT=4 ;;
              9)  SLOT=5 ;;
              11) SLOT=6 ;;
              13) SLOT=7 ;;
              15) SLOT=8 ;;
              *)  SLOT=1 ;;
            esac
            echo "slot=$SLOT" >> $GITHUB_OUTPUT
          fi

      - name: Post to Facebook
        env:
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN:     ${{ secrets.FB_PAGE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_NICHE:   ${{ secrets.INSTAGRAM_NICHE }}
          POST_SLOT:         ${{ steps.slot.outputs.slot }}
        run: python post_facebook.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_id }}
          path: post_log.json
          retention-days: 30
